version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./Code:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Sql/blog.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
